# Custom Properties for hsi_onprem_cicd Project
# This file contains project-specific properties that extend the standard build.properties
# These properties are loaded AFTER build.properties, so they can override standard values

#--------------------------Project-Specific Properties

# Software AG Installation (maps to reference property)
SAGHome=C:/IBM/webMethods

# Project Information
bda.projectName=hsi_onprem_cicd
bda.buildNumber=local

# Source Locations (maps to reference properties)
isProjectsDir=packages
isPackagesDir=packages
isTestDir=tests
isConfigDir=
bpmProjectsDir=
mwsProjectsDir=
rulesProjectsDir=
umProjectsDir=

# Build Output Configuration (maps to reference properties)
buildOutputDir=tmp/fbr
config.tmpdir=tmp
config.build.buildStorageDir=tmp/fbr

# File-Based Repository Configuration
fbrRepoName=${bda.projectName}_${bda.buildNumber}
fbrRepoDir=${config.build.buildStorageDir}/${fbrRepoName}

# Asset Build Environment Configuration
config.build.abeHome=${SAGHome}/common/AssetBuildEnvironment

# Deployer Configuration
config.deployer.deployerInstallationPath=${SAGHome}/IntegrationServer/instances/default/packages/WmDeployer/bin
config.deployer.deployerHost=localhost
config.deployer.deployerPort=5555
config.deployer.deployerUsername=Administrator
config.deployer.deployerPassword=manage
config.deployer.projectNamePrefix=${bda.projectName}

# Variable Substitution
config.deployer.doVarSub=true
varsubDir=varsub
config.deployer.splitDeploymentSets=false

# Test Configuration
config.test.reportDir=report
config.test.failBuildOnTestError=true

# Dependency Resolution
config.libs.resolve=remote

# Static Code Analysis (ISCCR)
config.isccr.enable=false
config.isscr.home=

# Logging
config.log.level=INFO

