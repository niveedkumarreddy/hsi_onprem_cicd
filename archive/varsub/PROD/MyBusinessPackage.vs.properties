# Variable Substitution for PROD Environment
# Package: MyBusinessPackage

# Database Configuration
database.url=jdbc:oracle:thin:@prod-db.company.com:1521:PRODDB
database.username=prod_user
database.password=prod_pass
database.pool.min=20
database.pool.max=100
database.timeout=60000

# Universal Messaging Configuration
um.url=nsp://prod-um.company.com:9000
um.username=Administrator
um.password=manage
um.connectionAlias=ProdUM

# AS400 Configuration
as400.host=prod-as400.company.com
as400.username=prod_as400
as400.password=prod_pass
as400.library=PRODLIB
as400.connectionAlias=ProdAS400

# API Endpoints
api.endpoint=https://api.company.com
api.timeout=60000
api.retryCount=5

# Application Settings
app.environment=PROD
app.logLevel=WARN
app.enableDebug=false
app.maxThreads=50

# Email Configuration
email.smtp.host=smtp.company.com
email.smtp.port=25
email.from=noreply@company.com

# File Paths
file.input.path=/data/prod/input
file.output.path=/data/prod/output
file.archive.path=/data/prod/archive
file.error.path=/data/prod/error

