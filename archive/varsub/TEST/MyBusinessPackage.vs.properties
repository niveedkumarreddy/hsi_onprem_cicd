# Database Configuration
database.url=jdbc:oracle:thin:@test-db.company.com:1521:TESTDB
database.username=test_user
database.password=test_pass
database.pool.min=10
database.pool.max=50
database.timeout=30000

# Universal Messaging Configuration
um.url=nsp://test-um.company.com:9000
um.username=Administrator
um.password=manage
um.connectionAlias=TestUM

# AS400 Configuration
as400.host=test-as400.company.com
as400.username=test_as400
