# Variable Substitution for DEV Environment
# Package: MyBusinessPackage

# Database Configuration
database.url=jdbc:oracle:thin:@dev-db.company.com:1521:DEVDB
database.username=dev_user
database.password=dev_pass
database.pool.min=5
database.pool.max=20
database.timeout=30000

# Universal Messaging Configuration
um.url=nsp://dev-server.company.com:9000
um.username=Administrator
um.password=manage
um.connectionAlias=DevUM

# AS400 Configuration
as400.host=dev-as400.company.com
as400.username=dev_as400
as400.password=dev_pass
as400.library=DEVLIB
as400.connectionAlias=DevAS400

# API Endpoints
api.endpoint=https://dev-api.company.com
api.timeout=30000
api.retryCount=3

# Application Settings
app.environment=DEV
app.logLevel=DEBUG
app.enableDebug=true
app.maxThreads=10

# Email Configuration
email.smtp.host=dev-smtp.company.com
email.smtp.port=25
email.from=noreply-dev@company.com

# File Paths
file.input.path=/data/dev/input
file.output.path=/data/dev/output
file.archive.path=/data/dev/archive
file.error.path=/data/dev/error

