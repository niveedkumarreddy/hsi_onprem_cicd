name: SonarQube Code Quality Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  SAG_HOME: ${{ vars.SAG_HOME }}
  JAVA_HOME: ${{ vars.JAVA_HOME }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}

jobs:
  sonarqube-analysis:
    name: SonarQube Code Quality Scan
    runs-on: self-hosted
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Cache SonarQube Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('**/sonar-project.properties') }}
          restore-keys: |
            ${{ runner.os }}-sonar-
      
      - name: Download and Setup SonarScanner
        shell: powershell
        run: |
          $scannerDir = "sonar-scanner"
          $scannerVersion = "5.0.1.3006"
          
          if (-not (Test-Path $scannerDir)) {
            Write-Host "Downloading SonarScanner..."
            $url = "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$scannerVersion-windows.zip"
            Invoke-WebRequest -Uri $url -OutFile "sonar-scanner.zip"
            
            Write-Host "Extracting SonarScanner..."
            Expand-Archive -Path "sonar-scanner.zip" -DestinationPath "."
            Rename-Item "sonar-scanner-$scannerVersion-windows" $scannerDir
            Remove-Item "sonar-scanner.zip"
          }
          
          Write-Host "SonarScanner ready at: $scannerDir"
      
      - name: Run SonarQube Analysis
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $scannerPath = "./sonar-scanner/bin/sonar-scanner.bat"
          
          # Community Edition compatible parameters (no branch/PR analysis)
          $params = @(
            "-Dsonar.projectKey=${{ env.PROJECT_NAME }}",
            "-Dsonar.projectName=${{ env.PROJECT_NAME }}",
            "-Dsonar.sources=application/packages,framework/cicd,framework/deployer",
            "-Dsonar.tests=application/tests",
            "-Dsonar.host.url=$env:SONAR_HOST_URL",
            "-Dsonar.token=$env:SONAR_TOKEN",
            "-Dsonar.scm.provider=git",
            "-Dsonar.projectVersion=${{ github.run_number }}",
            "-Dsonar.exclusions=**/node.idf,**/node.ndf,**/*.java",
            "-Dsonar.lang.patterns.xml=**/*.xsd,**/*.xsl,**/build*.xml,**/pom.xml",
            "-Dsonar.lang.patterns.flow=**/flow.xml,**/*.ndf"
          )
          
          Write-Host "Running SonarQube analysis (Community Edition mode)..."
          Write-Host "Note: Branch and PR analysis require Developer Edition or higher"
          Write-Host "Parameters: $($params -join ' ')"
          
          & $scannerPath $params
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "SonarQube analysis failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
      
      - name: Check Quality Gate (PowerShell)
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          Write-Host "Checking Quality Gate status..."
          
          # Read the report task file
          $reportTaskFile = ".scannerwork/report-task.txt"
          if (-not (Test-Path $reportTaskFile)) {
            Write-Host "⚠️ Report task file not found"
            "### ⚠️ SonarQube Quality Gate: Report file not found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }
          
          # Parse the CE task URL
          $content = Get-Content $reportTaskFile
          $ceTaskUrl = ($content | Where-Object { $_ -match "ceTaskUrl=" }) -replace "ceTaskUrl=", ""
          
          if (-not $ceTaskUrl) {
            Write-Host "⚠️ CE Task URL not found"
            "### ⚠️ SonarQube Quality Gate: Task URL not found" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }
          
          Write-Host "CE Task URL: $ceTaskUrl"
          
          # Wait for analysis to complete and get quality gate status
          $maxAttempts = 30
          $attempt = 0
          $status = "PENDING"
          
          while ($attempt -lt $maxAttempts -and $status -eq "PENDING") {
            Start-Sleep -Seconds 10
            $attempt++
            
            try {
              $headers = @{
                "Authorization" = "Bearer $env:SONAR_TOKEN"
              }
              
              $response = Invoke-RestMethod -Uri $ceTaskUrl -Headers $headers -Method Get
              $taskStatus = $response.task.status
              
              Write-Host "Attempt $attempt/$maxAttempts - Task status: $taskStatus"
              
              if ($taskStatus -eq "SUCCESS") {
                $analysisId = $response.task.analysisId
                $qualityGateUrl = "$env:SONAR_HOST_URL/api/qualitygates/project_status?analysisId=$analysisId"
                
                $qgResponse = Invoke-RestMethod -Uri $qualityGateUrl -Headers $headers -Method Get
                $status = $qgResponse.projectStatus.status
                
                Write-Host "Quality Gate Status: $status"
                
                if ($status -eq "OK") {
                  Write-Host "✅ Quality Gate PASSED"
                  "### ✅ SonarQube Quality Gate: PASSED" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                }
                elseif ($status -eq "ERROR") {
                  Write-Host "❌ Quality Gate FAILED"
                  "### ❌ SonarQube Quality Gate: FAILED" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                  "Please review the issues in SonarQube dashboard" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                }
                else {
                  Write-Host "⚠️ Quality Gate status: $status"
                  "### ⚠️ SonarQube Quality Gate: $status" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                }
                
                break
              }
              elseif ($taskStatus -eq "FAILED" -or $taskStatus -eq "CANCELED") {
                Write-Host "❌ Analysis task $taskStatus"
                "### ❌ SonarQube Analysis: $taskStatus" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                break
              }
            }
            catch {
              Write-Host "Error checking status: $_"
              if ($attempt -eq $maxAttempts) {
                Write-Host "⚠️ Timeout waiting for quality gate"
                "### ⚠️ SonarQube Quality Gate: Timeout" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
              }
            }
          }
          
          "View full report: $env:SONAR_HOST_URL/dashboard?id=${{ env.PROJECT_NAME }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
      
      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report-${{ github.run_number }}
          path: .scannerwork/report-task.txt
          retention-days: 30
      

