# SonarQube Project Configuration for webMethods CI/CD
# This file configures SonarQube analysis for webMethods Integration Server packages

# ============================================================================
# Project Identification
# ============================================================================
sonar.projectKey=hsi_onprem_cicd
sonar.projectName=HSI OnPrem CI/CD
sonar.projectVersion=1.0

# ============================================================================
# Source Code Configuration
# ============================================================================
# Source directories to analyze
sonar.sources=packages,cicd,deployer

# Test directories
sonar.tests=tests

# ============================================================================
# File Inclusions and Exclusions
# ============================================================================
# Include specific file types
sonar.inclusions=**/*.java,**/*.xml,**/*.flow,**/*.ndf,**/*.idf,**/*.properties,**/*.groovy

# Exclude build artifacts, dependencies, and generated files
sonar.exclusions=**/node_modules/**,\
                 **/target/**,\
                 **/build/**,\
                 **/tmp/**,\
                 **/report/**,\
                 **/.scannerwork/**,\
                 **/manifest.v3,\
                 **/code/classes/**,\
                 **/*.zip,\
                 **/*.jar,\
                 **/*.acdl

# Test file patterns
sonar.test.inclusions=**/tests/**/*.java,**/tests/**/*.xml

# ============================================================================
# Language-Specific Settings
# ============================================================================
# Java configuration
sonar.java.source=17
sonar.java.target=17
# webMethods packages don't have traditional compiled classes
# Skip Java bytecode analysis - analyze source code only
sonar.java.binaries=.

# XML configuration
# Flow analyzer handles: .xml, .ndf files (flow services and node definitions)
# XML analyzer only handles: .idf files (interface definitions)
sonar.xml.file.suffixes=.idf

# ============================================================================
# Code Coverage
# ============================================================================
# JaCoCo coverage report paths (if available)
sonar.coverage.jacoco.xmlReportPaths=report/coverage/jacoco.xml

# ============================================================================
# Quality Gate Configuration
# ============================================================================
# Wait for quality gate result
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# ============================================================================
# Analysis Parameters
# ============================================================================
# Source file encoding
sonar.sourceEncoding=UTF-8

# SCM provider
sonar.scm.provider=git

# Disable SCM sensor if needed
sonar.scm.disabled=false

# ============================================================================
# Issue Exclusions (webMethods-specific)
# ============================================================================
# Ignore certain rules for generated or vendor code
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# Ignore string literal duplication in generated code
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/code/source/**

# Ignore XML schema validation for manifest files
sonar.issue.ignore.multicriteria.e2.ruleKey=xml:*
sonar.issue.ignore.multicriteria.e2.resourceKey=**/manifest.v3

# Ignore complexity in flow services (XML-based)
sonar.issue.ignore.multicriteria.e3.ruleKey=xml:S1067
sonar.issue.ignore.multicriteria.e3.resourceKey=**/flow.xml

# Ignore file header comments in generated files
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S1451
sonar.issue.ignore.multicriteria.e4.resourceKey=**/code/source/**

# ============================================================================
# Additional Metrics
# ============================================================================
# Duplication detection
sonar.cpd.exclusions=**/code/source/**

# ============================================================================
# Pull Request Analysis
# ============================================================================
# These will be overridden by CI/CD pipeline
# sonar.pullrequest.key=
# sonar.pullrequest.branch=
# sonar.pullrequest.base=

# ============================================================================
# Branch Analysis
# ============================================================================
